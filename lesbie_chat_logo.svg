<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <clipPath id="bg-clip">
      <rect x="0" y="0" width="512" height="512" rx="120"/>
    </clipPath>
  </defs>

  <!-- Fon kare awondi vyolèt nwa -->
  <rect x="0" y="0" width="512" height="512" rx="120" fill="#2D1B4E"/>

  <!-- Sèk dekoratif andan -->
  <circle cx="256" cy="230" r="190" fill="#3D2560"/>

  <!-- Gwo boul chat rozado -->
  <rect x="30" y="40" width="452" height="320" rx="80" fill="#D4537E"/>

  <!-- Ke boul chat -->
  <path d="M80 360 L50 430 L140 360Z" fill="#D4537E"/>

  <!-- Senbòl Venus gòch blan -->
  <circle cx="190" cy="195" r="68" fill="none" stroke="#ffffff" stroke-width="12"/>
  <line x1="190" y1="263" x2="190" y2="320" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>
  <line x1="155" y1="294" x2="225" y2="294" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>

  <!-- Senbòl Venus dwat rozado klè -->
  <circle cx="322" cy="195" r="68" fill="none" stroke="#FBEAF0" stroke-width="12" opacity="0.9"/>
  <line x1="322" y1="263" x2="322" y2="320" stroke="#FBEAF0" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
  <line x1="287" y1="294" x2="357" y2="294" stroke="#FBEAF0" stroke-width="12" stroke-linecap="round" opacity="0.9"/>

  <!-- Pwen vyolèt kwen -->
  <circle cx="438" cy="58" r="44" fill="#7F77DD"/>
  <circle cx="438" cy="58" r="26" fill="#EEEDFE"/>
  <circle cx="438" cy="58" r="12" fill="#534AB7"/>

  <!-- Ti kè dekoratif -->
  <path d="M62 82 C62 82 44 70 44 57 C44 48 51 43 58 43 C61 43 64 46 65 49 C66 46 69 43 72 43 C79 43 86 48 86 57 C86 70 65 82 65 82Z" fill="#fff" opacity="0.3"/>

  <!-- Non app la -->
  <text x="256" y="430" text-anchor="middle" font-family="Georgia, serif" font-size="58" font-weight="bold" fill="#ffffff" letter-spacing="3">Lesbie</text>
  <text x="256" y="490" text-anchor="middle" font-family="Georgia, serif" font-size="36" fill="#7F77DD" letter-spacing="8">CHAT</text>
</svg>
